<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b5fff">
  <meta name="description" content="Study tool for the Canadian Advanced amateur radio qualification.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>CanHam Study Buddy — Advanced</title>
  <link rel="stylesheet" href="styles.css">
  <script>
    // Apply the saved theme before first paint (default dark) to avoid a flash.
    try { document.documentElement.setAttribute('data-theme', localStorage.getItem('canham_theme') === 'light' ? 'light' : 'dark'); }
    catch (e) { document.documentElement.setAttribute('data-theme', 'dark'); }
  </script>
</head>
<body>
  <header class="appbar">
    <div class="appbar-inner">
      <h1>CanHam Study Buddy <span class="sub">Advanced</span></h1>
      <div class="appbar-right">
        <button id="theme-toggle" class="iconbtn" type="button" data-action="toggle-theme" aria-label="Toggle light or dark theme" title="Toggle light/dark">
          <svg class="ic-sun" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M19.1 4.9l-1.4 1.4M6.3 17.7l-1.4 1.4"/></svg>
          <svg class="ic-moon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/></svg>
        </button>
        <span id="sync-chip" class="chip">On this device</span>
      </div>
    </div>
  </header>

  <main id="view" class="container"></main>

  <nav id="nav" class="bottomnav">
    <button data-nav="dashboard" class="active">Home</button>
    <button data-nav="stats">Progress</button>
    <button data-nav="notes">Notes</button>
    <button data-nav="account">Login</button>
  </nav>

  <script type="module" src="js/app.js"></script>
</body>
</html>
